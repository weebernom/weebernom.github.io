<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momin | Cybersecurity Portfolio</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="terminal">
        <div id="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <p>momin@giki-portfolio: ~</p>
        </div>
        <div id="output">
            <p class="greeting">Welcome to Momin's Cyber Portfolio. Type 'help' to see available commands.</p>
        </div>
        <div id="input-line">
            <span class="prompt">u2025581@giki:~$</span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
