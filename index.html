<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momin | Mission Control</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --terminal-black: rgba(10, 10, 10, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050505;
            color: var(--matrix-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.15;
        }

        #terminal {
            width: 90%;
            max-width: 900px;
            height: 70vh;
            background: var(--terminal-black);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            border-radius: 8px;
        }

        #terminal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dots { display: flex; gap: 6px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .header-title { font-size: 0.8rem; opacity: 0.6; }

        #output { 
            overflow-y: auto; 
            flex-grow: 1; 
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        #output p { margin: 5px 0; line-height: 1.4; word-break: break-all; }

        #input-line { display: flex; gap: 10px; align-items: center; }

        #command-input {
            background: transparent;
            border: none;
            color: var(--matrix-green);
            outline: none;
            flex-grow: 1;
            font-family: inherit;
            font-size: 1rem;
            text-shadow: 0 0 5px var(--matrix-green);
        }

        .prompt { color: #008f11; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="terminal">
        <div id="terminal-header">
            <div class="dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <p class="header-title">momin@giki-portfolio: ~</p>
        </div>
        
        <div id="output"></div>

        <div id="input-line">
            <span class="prompt">u2025581@giki:~$</span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('command-input');
        const output = document.getElementById('output');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // 1. Matrix Animation
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // 2. Commands Data
        const commands = {
            "help": "Available commands: bio, projects, skills, contact, clear, resume",
            "bio": "Momin | GIKI. Specializing in Cybersecurity and Penetration Testing. Current focus: Networking and Info Gathering.",
            "skills": "• Python, C++\n• Nmap, Wireshark, Metasploit\n• Research, Debugging.",
            "projects": "1. Mess App (GIKI Specific)",
            "contact": "Email: u2025581@giki.edu.pk | GitHub: github.com/weebernom",
            "resume": "Secure link: https://drive.google.com/file/d/1yhsZL21pgnWYDa7EabhP1-jzr2WJKFXg/view?usp=sharing"
        };

        // 3. Typewriter Core
        async function typeWriter(text) {
            const p = document.createElement('p');
            output.appendChild(p);
            // Handling line breaks
            const lines = text.split('\n');
            for (let line of lines) {
                for (let char of line) {
                    p.textContent += char;
                    await new Promise(r => setTimeout(r, 15));
                }
                p.innerHTML += "<br>";
            }
            output.scrollTop = output.scrollHeight;
        }

        // 4. Input Handler
        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                input.value = '';

                // Show the user's command
                const userLine = document.createElement('p');
                userLine.innerHTML = `<span class="prompt">u2025581@giki:~$</span> ${cmd}`;
                output.appendChild(userLine);

                if (cmd === 'clear') {
                    output.innerHTML = '';
                } else if (commands[cmd]) {
                    await typeWriter(commands[cmd]);
                } else if (cmd !== "") {
                    await typeWriter(`'${cmd}' is not recognized. Type 'help' to see valid commands.`);
                }
                output.scrollTop = output.scrollHeight;
            }
        });

        // Initialize
        window.onload = () => {
            typeWriter("SYSTEM BOOT SUCCESSFUL.\nWelcome to Momin's Cyber Terminal.\nType 'help' to begin reconnaissance...");
            input.focus();
        };

        // Keep focused
        document.body.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
